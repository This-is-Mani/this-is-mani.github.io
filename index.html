<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CloudStorm Domain</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding: 40px;
    }

    h1 {
      font-size: 2.5rem;
      margin: 0;
    }

    .line {
      width: 220px;
      height: 2px;
      background: #38bdf8;
      margin: 20px auto;
    }

    .price {
      font-size: 1.5rem;
      margin-top: 10px;
      color: #38bdf8;
      font-weight: bold;
    }

    .subtext {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 10px;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 28px;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      color: #000;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    #emailBox {
      display: none;
      margin-top: 20px;
      font-size: 18px;
      background: rgba(255,255,255,0.1);
      padding: 10px 15px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>This Domain is For Sale</h1>

    <div class="line"></div>

    <p>cloudstorm.in</p>

    <div class="price">₹25,000</div>

    <div class="subtext">
      Serious buyers only. Quick deal available.
    </div>

    <button class="btn" onclick="showEmail()">
      Contact Owner
    </button>

    <div id="emailBox">
      📧 manithecool225@gmail.com
    </div>

  </div>

  <script>
    function showEmail() {
      document.getElementById("emailBox").style.display = "block";
    }
  </script>

</body>
</html>
