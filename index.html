<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CloudStorm Domain</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      position: relative;
      padding: 40px;
    }

    .logo {
      position: absolute;
      width: 300px;
      opacity: 0.08;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    h1 {
      font-size: 2.5rem;
      margin: 0;
    }

    .line {
      width: 220px;
      height: 2px;
      background: #38bdf8;
      margin: 20px auto;
    }

    p {
      font-size: 1.2rem;
      margin: 10px 0;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #38bdf8;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    #emailBox {
      display: none;
      margin-top: 20px;
      font-size: 18px;
      background: rgba(255,255,255,0.1);
      padding: 10px 15px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Optional logo -->
    <img src="logo.png" class="logo" alt="logo">

    <h1>This Domain is For Sale</h1>

    <div class="line"></div>

    <p>cloudstorm.in</p>

    <!-- Contact Button -->
    <button class="btn" onclick="showEmail()">
      Contact Owner
    </button>

    <!-- Email Display -->
    <div id="emailBox">
      📧 manithecool225@gmail.com
    </div>

  </div>

  <script>
    function showEmail() {
      document.getElementById("emailBox").style.display = "block";
    }
  </script>

</body>
</html>
