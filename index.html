<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CloudStorm Domain</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html {
      font-size: clamp(16px, 1.2vw, 20px);
    }

    body {
      margin: 0;

      /* ✅ CLEAN BACKGROUND (NO BLACK BOX) */
      background: url('bg.png') no-repeat top center;
      background-size: 100% auto;
      background-color: #0f172a;

      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    /* 🔥 VERY LIGHT OVERLAY (optional, remove if not needed) */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.15);
      pointer-events: none;
    }

    .container {
      max-width: 600px;
      margin: 80px auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 10px;
    }

    .line {
      width: 180px;
      height: 2px;
      background: #38bdf8;
      margin: 15px auto;
    }

    p {
      font-size: 1.2rem;
      margin: 6px 0;
    }

    .price {
      font-size: 1.6rem;
      margin-top: 10px;
      color: #38bdf8;
      font-weight: bold;
    }

    .subtext {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 10px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      padding: 10px 20px;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      color: #000;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* CONTACT */
    .inline-box {
      display: none;
      margin-top: 15px;

      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;

      font-size: 1rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .email a {
      color: #e5e7eb;
      text-decoration: none;
    }

    .email a:hover {
      color: white;
    }

    .whatsapp a {
      color: #25D366;
      text-decoration: none;
      font-weight: 600;
    }

    .whatsapp a:hover {
      color: #4ade80;
    }

    .whatsapp-icon {
      width: 18px;
    }

    #offerForm {
      display: none;
      margin-top: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      border-radius: 4px;
      border: none;
      font-size: 0.95rem;
    }

    .submit-btn {
      background: #22c55e;
      color: white;
      margin-top: 10px;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .container {
        margin: 40px auto;
      }

      h1 {
        font-size: 2rem;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .inline-box {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>This Domain is For Sale</h1>

    <div class="line"></div>

    <p>cloudstorm.in</p>

    <div class="price">₹25,000</div>

    <div class="subtext">
      Serious buyers only. Quick deal available.
    </div>

    <div class="actions">
      <button class="btn" onclick="toggleContact()">Contact Owner</button>
      <button class="btn" onclick="toggleOffer()">Make an Offer</button>
    </div>

    <div id="contactBox" class="inline-box">
      <div class="contact-item email">
        📧 <a href="mailto:manithecool225@gmail.com">manithecool225@gmail.com</a>
      </div>

      <div class="contact-item whatsapp">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
             class="whatsapp-icon">
        <a href="https://wa.me/919441810275" target="_blank">9441810275</a>
      </div>
    </div>

    <form id="offerForm">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <input type="number" placeholder="Your Offer Amount" required>
      <textarea placeholder="Message (optional)"></textarea>
      <button type="submit" class="btn submit-btn">Send Offer</button>
    </form>

  </div>

  <script>
    function toggleContact() {
      const box = document.getElementById("contactBox");
      box.style.display = (box.style.display === "flex") ? "none" : "flex";
    }

    function toggleOffer() {
      const form = document.getElementById("offerForm");
      form.style.display = (form.style.display === "block") ? "none" : "block";
    }
  </script>

</body>
</html>
