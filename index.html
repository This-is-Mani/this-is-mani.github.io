<!DOCTYPE html>
<html>
<head>
  <title>CloudStorm</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      position: relative;
    }

    img {
      position: absolute;
      width: 300px;
      opacity: 0.1;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    h1 {
      font-size: 2.5rem;
    }

    .line {
      width: 200px;
      height: 2px;
      background: white;
      margin: 15px auto;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #38bdf8;
      color: black;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    .btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<div class="box">
  <img src="logo.png">

  <h1>This Domain is For Sale</h1>
  <div class="line"></div>
  <p>cloudstorm.in</p>

  <!-- Contact Button -->
  <a class="btn" href="manithecool225@gmail.com">
    Contact Owner
  </a>

</div>

</body>
</html>
