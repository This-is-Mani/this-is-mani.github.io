<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CloudStorm Domain</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html {
  font-size: clamp(18px, 1.4vw, 22px);
}

body {
  margin: 0;
  background: url('bg.png') no-repeat center center;
  background-size: cover;
  background-color: #0f172a;

  color: white;
  font-family: Arial, sans-serif;
  text-align: center;

  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* DARK OVERLAY */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: -1;
}

.container {
  max-width: 600px;
  padding: 30px 20px;
}

h1 {
  font-size: 2.6rem;
  margin-bottom: 10px;
}

.line {
  width: 180px;
  height: 2px;
  background: #38bdf8;
  margin: 20px auto;
}

p {
  font-size: 1.2rem;
  margin: 8px 0;
}

/* PRICE */
.price-box {
  margin-top: 10px;
}

.old-price {
  font-size: 1.2rem;
  color: rgba(255,255,255,0.5);
  position: relative;
  display: inline-block;
  margin-bottom: 6px;
}

.old-price::after {
  content: "";
  position: absolute;
  left: 0;
  top: 50%;
  width: 100%;
  height: 2.5px;
  background: linear-gradient(90deg, transparent, #60e6ff 25%, #38bdf8 50%, #60e6ff 75%, transparent);
  transform: translateY(-50%);
  box-shadow: 0 0 6px rgba(56,189,248,0.9);
}

.new-price {
  font-size: 2.3rem;
  font-weight: bold;
}

/* TRUST */
.trust {
  margin-top: 12px;
  font-size: 0.9rem;
  opacity: 0.8;
}

/* SUBTEXT */
.subtext {
  font-size: 1rem;
  opacity: 0.85;
  margin-top: 12px;
}

/* BUTTONS */
.actions {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
  margin-top: 25px;
}

.btn {
  padding: 13px 26px;
  background: linear-gradient(90deg, #38bdf8, #0ea5e9);
  color: #000;
  border: none;
  border-radius: 999px;
  font-weight: bold;
  cursor: pointer;
}

.btn:hover {
  transform: scale(1.05);
}

/* CONTACT */
.inline-box {
  display: none;
  margin-top: 18px;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
}

.email a {
  color: #e5e7eb;
  text-decoration: none;
}

.whatsapp a {
  color: #25D366;
  text-decoration: none;
}

/* FORM */
#offerForm {
  display: none;
  margin-top: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  border: none;
}

/* SUCCESS MESSAGE */
#successMessage {
  display: none;
  margin-top: 20px;
  padding: 15px;
  border-radius: 8px;
  background: rgba(34,197,94,0.15);
  border: 1px solid #22c55e;
  color: #22c55e;
  font-size: 0.95rem;
}

/* MOBILE */
@media (max-width: 600px) {
  body {
    align-items: flex-start;
    padding-top: 40px;
  }

  .actions {
    flex-direction: column;
  }

  .btn {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>This Domain is For Sale</h1>

<div class="line"></div>

<p>cloudstorm.in</p>

<div class="price-box">
  <div class="old-price">₹49,999/-</div>
  <div class="new-price">₹25,000/-</div>
</div>

<div class="trust">
✔ Secure Transfer • ✔ Instant Ownership • ✔ Trusted Seller
</div>

<div class="subtext">
Only one buyer can own this domain.
</div>

<div class="actions">
  <button class="btn" onclick="toggleContact()">Get This Domain</button>
  <button class="btn" onclick="toggleOffer()">Make an Offer</button>
</div>

<!-- CONTACT -->
<div id="contactBox" class="inline-box">
  <div class="email">
    📧 <a href="mailto:contact@cloudstorm.in">contact@cloudstorm.in</a>
  </div>

  <div class="whatsapp">
    <a href="https://wa.me/919441810275?text=Hi I am interested in cloudstorm.in">
      Chat on WhatsApp
    </a>
  </div>
</div>

<!-- FORM -->
<form id="offerForm" action="https://formspree.io/f/xpqkdndr" method="POST">

  <input type="text" name="name" placeholder="Your Name" required>
  
  <input type="email" name="email" placeholder="Your Email" required>
  
  <input type="number" name="offer" placeholder="Your Offer Amount" required>
  
  <textarea name="message" placeholder="Message (optional)"></textarea>

  <button type="submit" class="btn">Submit Offer</button>

</form>

<!-- SUCCESS -->
<div id="successMessage">
✅ Thank you for your offer. We will get back to you within 24–48 hours.
</div>

</div>

<script>
function toggleContact() {
  document.getElementById("contactBox").style.display = "flex";
  document.getElementById("offerForm").style.display = "none";
  document.getElementById("successMessage").style.display = "none";
}

function toggleOffer() {
  document.getElementById("contactBox").style.display = "none";
  document.getElementById("offerForm").style.display = "block";
  document.getElementById("successMessage").style.display = "none";
}

document.getElementById("offerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const form = e.target;
  const data = new FormData(form);

  const response = await fetch(form.action, {
    method: "POST",
    body: data,
    headers: { 'Accept': 'application/json' }
  });

  if (response.ok) {
    form.style.display = "none";
    document.getElementById("successMessage").style.display = "block";
  } else {
    alert("Something went wrong. Please try again.");
  }
});
</script>

</body>
</html>
