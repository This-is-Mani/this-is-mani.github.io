<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CloudStorm Domain</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P6NPZMDKWR"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-P6NPZMDKWR');
  </script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding: 40px;
    }

    h1 {
      font-size: 2.5rem;
      margin: 0;
    }

    .line {
      width: 220px;
      height: 2px;
      background: #38bdf8;
      margin: 20px auto;
    }

    p {
      font-size: 1.2rem;
      margin: 10px 0;
    }

    .price {
      font-size: 1.5rem;
      margin-top: 10px;
      color: #38bdf8;
      font-weight: bold;
    }

    .subtext {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      color: #000;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    #contactBox, #offerForm {
      display: none;
      margin-top: 20px;
      font-size: 16px;
      background: rgba(255,255,255,0.1);
      padding: 12px 18px;
      border-radius: 6px;
    }

    #contactBox p {
      margin: 8px 0;
    }

    a {
      color: #25D366;
      text-decoration: none;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      border-radius: 4px;
      border: none;
    }

    .submit-btn {
      background: #22c55e;
      color: white;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>This Domain is For Sale</h1>

    <div class="line"></div>

    <p>cloudstorm.in</p>

    <div class="price">₹25,000</div>

    <div class="subtext">
      Serious buyers only. Quick deal available.
    </div>

    <!-- Contact -->
    <button class="btn" onclick="showContact()">Contact Owner</button>

    <div id="contactBox">
      <p>📧 manithecool225@gmail.com</p>
      <p>
        🟢 WhatsApp: 
        <a href="https://wa.me/919441810275?text=Hi%20I%20am%20interested%20in%20cloudstorm.in" target="_blank">
          9441810275
        </a>
      </p>
    </div>

    <!-- Offer -->
    <button class="btn" onclick="showOffer()">Make an Offer</button>

    <form id="offerForm" action="mailto:manithecool225@gmail.com" method="post" enctype="text/plain">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <input type="number" name="offer" placeholder="Your Offer Amount" required>
      <textarea name="message" placeholder="Message (optional)"></textarea>
      <button type="submit" class="btn submit-btn">Send Offer</button>
    </form>

  </div>

  <script>
    function showContact() {
      document.getElementById("contactBox").style.display = "block";
    }

    function showOffer() {
      document.getElementById("offerForm").style.display = "block";
    }
  </script>

</body>
</html>
